<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash Games Archive</title>
  <link rel="stylesheet" href="site/style.css">
  <script>
    let allGames = [];

    function createGameGrid() {
      const grid = document.getElementById('game-grid');
      const countEl = document.querySelector('.count');
      const filter = document.getElementById('search-box').value.toLowerCase();
      grid.innerHTML = '';
      const visible = allGames.filter(g => g.title.toLowerCase().includes(filter));
      countEl.textContent = `${visible.length} game${visible.length !== 1 ? 's' : ''}`;
      if (!visible.length) {
        grid.innerHTML = '<p class="empty">No games matched your search.</p>';
        return;
      }
      visible.forEach(game => {
        const card = document.createElement('a');
        card.className = 'game-card';
        card.textContent = game.title;
        card.href = game.page;
        grid.appendChild(card);
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      fetch('site/games.json')
        .then(r => r.json())
        .then(data => {
          allGames = data;
          createGameGrid();
        })
        .catch(() => {
          document.getElementById('game-grid').innerHTML =
            '<p class="empty">Failed to load game list.</p>';
        });
      document.getElementById('search-box').addEventListener('input', createGameGrid);
    });
  </script>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Flash Games Archive</h1>
        <p>Click a game below to play it with Ruffle.</p>
      </div>
    </header>
    <section class="search-bar">
      <input id="search-box" type="search" placeholder="Search games..." aria-label="Search games">
      <span class="count"></span>
    </section>
    <section id="game-grid" class="grid"></section>
    <footer>
      <p>SWF files served via <a href="https://www.jsdelivr.com/">jsDelivr</a> CDN from this repository.</p>
    </footer>
  </main>
</body>
</html>
